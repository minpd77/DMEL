const BCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkPXudgO_znrjg8-ZyoSmMb5dhrISbANstWt3xNanbbTNCNRhDwAQgxhrECxwN8R2QSV8lTgln6_9P/pub?gid=1183872898&single=true&output=csv";
const NAVERMAP_ICON="https://www.darun.io/_next/image?url=https%3A%2F%2Fres.cloudinary.com%2Fdqddtkvmb%2Fimage%2Fupload%2Fv1715433300%2Fimages%2Flogos%2Fnavermap.png&w=256&q=75";

let dayEndOffset = 5;

function showLoading(){ $overlay.style.display="flex"; }
function hideLoading(){ $overlay.style.display="none"; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function fetchTextWithRetry(url,retries=3,delay=700){
  let lastError;
  for(let i=1;i<=retries;i++){
    try{
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const text=await res.text();
      if(!String(text||"").trim()) throw new Error("빈 응답");
      return text;
    }catch(err){
      lastError=err;
      if(i<retries) await sleep(delay);
    }
  }
  throw lastError || new Error("불러오기 실패");
}

function parseCSV(text){
  const rows=[];
  let curRow=[], cell="", inQuotes=false;
  text=String(text||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");

  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"'){
      if(inQuotes && next==='"'){ cell+='"'; i++; }
      else inQuotes=!inQuotes;
    }else if(ch==="," && !inQuotes){
      curRow.push(cell); cell="";
    }else if(ch==="\n" && !inQuotes){
      curRow.push(cell);
      rows.push(curRow);
      curRow=[]; cell="";
    }else{
      cell+=ch;
    }
  }
  curRow.push(cell);
  rows.push(curRow);

  return rows
    .filter(r=>!(r.length===1 && String(r[0]).trim()===""))
    .map(r=>r.map(v=>String(v||"").trim()));
}

function pad7(v){ return String(v||"").padStart(7,"0"); }

function extract7(link){
  const m=String(link||"").match(/\d+/g);
  return m ? pad7(m[m.length-1]) : "";
}

function normalizeDateDigits(v){
  return String(v||"").replace(/[^\d]/g,"").trim();
}

function dateToYMD(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function ymdToDate(ymd){
  const m=String(ymd||"").match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return null;
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
}

function normalizeScheduleDateToYMD(v){
  const s=String(v||"").trim();
  if(!s) return "";
  const digits=s.replace(/[^\d]/g,"");

  if(/^\d{8}$/.test(digits)){
    if(digits.startsWith("20")) return `${digits.slice(0,4)}-${digits.slice(4,6)}-${digits.slice(6,8)}`;
    return `20${digits.slice(0,2)}-${digits.slice(2,4)}-${digits.slice(4,6)}`;
  }
  if(/^\d{6}$/.test(digits)) return `20${digits.slice(0,2)}-${digits.slice(2,4)}-${digits.slice(4,6)}`;

  const m=s.match(/^(\d{2,4})-(\d{2})-(\d{2})$/);
  if(m){
    const y=m[1].length===2 ? `20${m[1]}` : m[1];
    return `${y}-${m[2]}-${m[3]}`;
  }

  const d=new Date(s);
  return isNaN(d) ? "" : dateToYMD(d);
}

function getBaseWorkday(date=new Date()){
  const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const day=d.getDay();
  if(day===6) d.setDate(d.getDate()+2);
  if(day===0) d.setDate(d.getDate()+1);
  return d;
}

function addBusinessDays(date, offset){
  const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  if(offset===0){
    while(d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
    return d;
  }
  const step = offset>0 ? 1 : -1;
  let remain = Math.abs(offset);
  while(remain>0){
    d.setDate(d.getDate()+step);
    if(d.getDay()!==0 && d.getDay()!==6) remain--;
  }
  return d;
}

function todayYMD(){ return dateToYMD(new Date()); }
function baseWorkdayYMD(){ return dateToYMD(getBaseWorkday()); }

function isExpired(v){
  const d=normalizeDateDigits(v);
  return /^\d{8}$/.test(d) && d<todayYMD().replace(/-/g,"");
}

function formatDate(v){
  if(!v) return "";
  const s=String(v).trim();
  const n=normalizeDateDigits(s);

  if(/^\d{8}$/.test(n)){
    if(n.startsWith("20")) return `${n.slice(0,4)}-${n.slice(4,6)}-${n.slice(6,8)}`;
    return `${n.slice(0,2)}-${n.slice(2,4)}-${n.slice(4,6)}`;
  }
  if(/^\d{6}$/.test(n)) return `${n.slice(0,2)}-${n.slice(2,4)}-${n.slice(4,6)}`;

  const d=new Date(s);
  return isNaN(d) ? s : dateToYMD(d);
}

function formatShortDate(v){
  const f=formatDate(v);
  const m=f.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? `${m[1].slice(2)}-${m[2]}-${m[3]}` : f;
}

function formatMonthLabel(date){
  return `${date.getFullYear()}년 ${date.getMonth()+1}월`;
}

function weekdayKor(date){
  return ["일","월","화","수","목","금","토"][date.getDay()];
}

function formatDayPanelHead(date){
  return `${date.getDate()}${weekdayKor(date)}`;
}

function escapeHtml(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizeSearch(v){
  return String(v||"").toLowerCase().replace(/\s+/g,"").trim();
}

function includesNormalized(target,query){
  return normalizeSearch(target).includes(normalizeSearch(query));
}

function getSuggestSortKey(v){
  const s=String(v||"").trim();
  let base=s.replace(/\s+\d{7}\s*$/,"").trim();
  return base.replace(/\s+/g,"");
}

function getResultSortKey(row){
  return String(row?.name||"").trim().replace(/\s+/g,"");
}

function formatDefect(v){
  if(!v) return "";
  return String(v).replace(/(\d+\))/g,"<br>$1").replace(/^<br>/,"");
}

function highlightStatusText(v){
  const s=String(v||"").trim();
  if(!s) return "-";
  if(/미가입|미선임/.test(s)) return `<span class="redbold">🚨 ${escapeHtml(s)}</span>`;
  return escapeHtml(s);
}

function formatTimeHtml(v){
  const s=String(v||"").trim();
  return s==="0:33" ? '<span class="redbold">시간미정</span>' : escapeHtml(s);
}

function normalizeResultText(v){
  return String(v||"").trim().replace(/\s+/g," ").replace(/\s*\(\s*/g,"(").replace(/\s*\)\s*/g,")");
}

function isFieldActionStatus(v){ return normalizeResultText(v)==="합격(현장조치)"; }
function isConditionalStatus(v){ const s=normalizeResultText(v); return s==="불합격" || s==="조건부"; }
function isPassStatus(v){ return normalizeResultText(v)==="합격"; }

function resultBadgeHtml(v){
  const s=normalizeResultText(v);
  if(!s) return "";
  if(isFieldActionStatus(s)) return `<span class="resultBadge resultWarn">현장조치</span>`;
  if(isPassStatus(s)) return `<span class="resultBadge resultPass">합격</span>`;
  if(s==="불합격") return `<span class="resultBadge resultFail">불합격</span>`;
  if(s==="조건부") return `<span class="resultBadge resultFail">조건부</span>`;
  return `<span class="resultBadge resultEtc">${escapeHtml(String(v||"").trim())}</span>`;
}

function areaRoundBadgeHtml(area){
  const a=normalizeAreaLabel(area);
  if(a==="강북") return `<span class="areaRound gangbuk">강북</span>`;
  if(a==="강남") return `<span class="areaRound gangnam">강남</span>`;
  if(a==="경기") return `<span class="areaRound gyeonggi">경기</span>`;
  return `<span class="areaRound etc">${escapeHtml(a)}</span>`;
}

function getCardClass(v){
  if(isFieldActionStatus(v)) return "action";
  if(isConditionalStatus(v)) return "warn";
  return "ok";
}

function openNaverMap(address){
  const addr=String(address||"").trim();
  if(!addr){ alert("주소가 없습니다."); return; }
  location.href="nmap://search?query="+encodeURIComponent(addr)+"&appname=naver_map";
}

function normalizeAreaLabel(v){
  const s=String(v||"").trim();
  if(/강북/.test(s)) return "강북";
  if(/강남/.test(s)) return "강남";
  if(/경기/.test(s)) return "경기";
  return s || "기타";
}

function areaClass(area){
  if(area==="강북") return "area-gangbuk";
  if(area==="강남") return "area-gangnam";
  if(area==="경기") return "area-gyeonggi";
  return "area-etc";
}

function areaOrder(area){
  if(area==="강북") return 1;
  if(area==="강남") return 2;
  if(area==="경기") return 3;
  return 9;
}

function parseTimeValue(t){
  const s=String(t||"").trim();
  const m=s.match(/^(\d{1,2}):(\d{2})$/);
  return m ? Number(m[1])*60 + Number(m[2]) : 99999;
}

function sortItemsByAreaDateTime(arr){
  return [...arr].sort((a,b)=>{
    const ao=areaOrder(a.areaLabel)-areaOrder(b.areaLabel);
    if(ao!==0) return ao;
    if(String(a.date)!==String(b.date)) return String(a.date).localeCompare(String(b.date));
    const ah=parseTimeValue(a.time), bh=parseTimeValue(b.time);
    if(ah!==bh) return ah-bh;
    return String(a.name||"").localeCompare(String(b.name||""),"ko",{numeric:true,sensitivity:"base"});
  });
}

function sortItemsByDateTime(arr){
  return [...arr].sort((a,b)=>{
    if(String(a.date)!==String(b.date)) return String(a.date).localeCompare(String(b.date));
    const ah=parseTimeValue(a.time), bh=parseTimeValue(b.time);
    if(ah!==bh) return ah-bh;
    return String(a.name||"").localeCompare(String(b.name||""),"ko",{numeric:true,sensitivity:"base"});
  });
}

function updateButtons(){
  document.querySelectorAll("button[id^='btn-']").forEach(btn=>{
    if(btn.id!=="btn-refresh") btn.classList.remove("active");
  });
  if(currentMode==="area"){
    const btn=document.getElementById("btn-"+currentArea);
    if(btn) btn.classList.add("active");

function getMonthBusinessGrid(year, month){
  const lastDate=new Date(year,month+1,0).getDate();
  const weekRows=[];
  let currentWeek=new Array(5).fill(null);

  for(let d=1; d<=lastDate; d++){
    const cur=new Date(year,month,d);
    const day=cur.getDay();
    if(day===0 || day===6) continue;

    const idx=day-1;
    currentWeek[idx]=new Date(cur);

    const next=new Date(year,month,d+1);
    const isWeekEnd = d===lastDate || next.getDay()===6 || next.getDay()===0 || next.getMonth()!==month;
    if(isWeekEnd){
      weekRows.push(currentWeek);
      currentWeek=new Array(5).fill(null);
    }
  }
  if(currentWeek.some(Boolean)) weekRows.push(currentWeek);
  return weekRows;
}

function bindDayInfinite(baseDate){
  const scroller=document.getElementById("dayScroller");
  if(!scroller) return;
  let loading=false;

  scroller.addEventListener("scroll",()=>{
    if(loading) return;

    if(scroller.scrollLeft + scroller.clientWidth >= scroller.scrollWidth - 80){
      loading=true;
      const nextStart = dayEndOffset + 1;
      const nextEnd = dayEndOffset + 5;
      scroller.insertAdjacentHTML("beforeend", buildDayScrollerHtml(baseDate, nextStart, nextEnd));
      dayEndOffset = nextEnd;
      bindAreaContainerEvents();
      loading=false;
    }

    if(scroller.scrollLeft <= 40){
      loading=true;
      const oldWidth = scroller.scrollWidth;
      const oldLeft = scroller.scrollLeft;
      const prevStart = dayStartOffset - 5;
      const prevEnd = dayStartOffset - 1;
      scroller.insertAdjacentHTML("afterbegin", buildDayScrollerHtml(baseDate, prevStart, prevEnd));
      dayStartOffset = prevStart;
      bindAreaContainerEvents();
      requestAnimationFrame(()=>{
        scroller.scrollLeft = scroller.scrollWidth - oldWidth + oldLeft;
        loading=false;
      });
    }
  });
}

function renderSearch(q){
  const normalizedQ=normalizeSearch(q);
  const q7=pad7(normalizedQ.replace(/\D/g,""));

  const result=dbRows
    .filter(r=>
      includesNormalized(r.name,q) ||
      includesNormalized(r.id,q) ||
      (normalizedQ && normalizeSearch(r.id).includes(normalizeSearch(q7)))
    )
    .sort((a,b)=>{
      const ak=getResultSortKey(a);
      const bk=getResultSortKey(b);
      const byName=ak.localeCompare(bk,"ko",{numeric:true,sensitivity:"base"});
      if(byName!==0) return byName;
      return String(a.id||"").localeCompare(String(b.id||""),"ko",{numeric:true,sensitivity:"base"});
    });

  $container.innerHTML=result.length ? result.map(makeSearchCardHtml).join("") : "검색 결과 없음";
  bindAreaContainerEvents();
}

function rebuildSuggestions(){

  const q7=pad7(normalizedV.replace(/\D/g,""));

    .filter(k=>
      includesNormalized(k,v) ||
      (normalizedV && normalizeSearch(k).includes(normalizeSearch(q7)))
    )
    .sort((a,b)=>{
      const ak=getSuggestSortKey(a);
      const bk=getSuggestSortKey(b);
      const byName=ak.localeCompare(bk,"ko",{numeric:true,sensitivity:"base"});
      if(byName!==0) return byName;
      return String(a).localeCompare(String(b),"ko",{numeric:true,sensitivity:"base"});
    })
    .slice(0,10);

  $suggest.innerHTML=list.map(k=>`<div class="sitem">${escapeHtml(k)}</div>`).join("");

function buildStateFromParsed(rowsA, rowsB){
  data={gangbuk:[],gangnam:[],gyeonggi:[]};
  dbRows=[];
  dbById={};
  keywordList=[];
  calendarItems=[];

  for(const c of rowsB.slice(1)){
    const rawId=(c[1]||"").trim();
    const id=pad7(rawId);

    const row={
      name:c[0]||"",
      id,
      address:c[9]||"",
      AI:c[34]||"",
      areaGroup:normalizeAreaLabel(c[8]||""),
      AJ:c[35]||"",
      RESULT:c[36]||"",
      Y:c[26]||"",
      AA:c[28]||"",
      AC:c[30]||"",
      AF:c[33]||"",
      AN:c[39]||""
    };

    dbRows.push(row);
    dbById[id]=row;
    if(row.name) keywordList.push(`${row.name} ${id}`);
    if(/^\d+$/.test(rawId)) keywordList.push(id);
  }

  const rowsAData=rowsA.slice(1);
  let lastDate1="", lastDate2="", lastDate3="";
  const scheduledIdSet=new Set();

  for(const c of rowsAData){
    const date1=c[0]||lastDate1; if(c[0]) lastDate1=c[0];
    const date2=c[8]||lastDate2; if(c[8]) lastDate2=c[8];
    const date3=c[16]||lastDate3; if(c[16]) lastDate3=c[16];

    if(c[3]){
      const id=extract7(c[5]);
      const item={name:c[3],date:date1,time:c[1],type:c[2],area:c[4],id};
      data.gangbuk.push(item);
      if(id) scheduledIdSet.add(id);
    }
    if(c[11]){
      const id=extract7(c[13]);
      const item={name:c[11],date:date2,time:c[9],type:c[10],area:c[12],id};
      data.gangnam.push(item);
      if(id) scheduledIdSet.add(id);
    }
    if(c[19]){
      const id=extract7(c[21]);
      const item={name:c[19],date:date3,time:c[17],type:c[18],area:c[20],id};
      data.gyeonggi.push(item);
      if(id) scheduledIdSet.add(id);
    }
  }

  sortData(data.gangbuk);
  sortData(data.gangnam);
  sortData(data.gyeonggi);

  data.gangbuk.forEach(v=>{
    calendarItems.push({
      name:v.name,
      id:v.id,
      date:normalizeScheduleDateToYMD(v.date),
      time:v.time,
      type:v.type,
      areaDetail:v.area,
      areaLabel:"강북",
      address:(dbById[v.id]||{}).address||"",
      source:"A"
    });
  });
  data.gangnam.forEach(v=>{
    calendarItems.push({
      name:v.name,
      id:v.id,
      date:normalizeScheduleDateToYMD(v.date),
      time:v.time,
      type:v.type,
      areaDetail:v.area,
      areaLabel:"강남",
      address:(dbById[v.id]||{}).address||"",
      source:"A"
    });
  });
  data.gyeonggi.forEach(v=>{
    calendarItems.push({
      name:v.name,
      id:v.id,
      date:normalizeScheduleDateToYMD(v.date),
      time:v.time,
      type:v.type,
      areaDetail:v.area,
      areaLabel:"경기",
      address:(dbById[v.id]||{}).address||"",
      source:"A"
    });
  });

  for(const row of dbRows){
    const extraDate=normalizeScheduleDateToYMD(row.AJ);
    if(!row.id || scheduledIdSet.has(row.id) || !extraDate) continue;

    calendarItems.push({
      name:row.name||"",
      id:row.id,
      date:extraDate,
      time:"",
      type:"",
      areaDetail:row.AI || "",
      areaLabel:normalizeAreaLabel(row.areaGroup),
      address:row.address||"",
      source:"B"
    });
  }

  calendarItems=sortItemsByDateTime(calendarItems.filter(v=>/^\d{4}-\d{2}-\d{2}$/.test(v.date)));
  buildCalendarCounts();

  if(!selectedDate) selectedDate=todayYMD();
}

function saveCache(rowsA, rowsB){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      savedAt:Date.now(),
      rowsA,
      rowsB
    }));
  }catch(e){}
}

function loadCache(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    if(!parsed || !parsed.rowsA || !parsed.rowsB) return null;
    return parsed;
  }catch(e){
    return null;
  }
}

function showCacheHint(text){
  $cacheHint.textContent=text||"";
}

async function loadAllData(forceRefresh=false){
  const cached=loadCache();
  const now=Date.now();

  if(cached && !forceRefresh){
    buildStateFromParsed(cached.rowsA, cached.rowsB);
    showCacheHint("저장된 데이터 먼저 표시 중 · 최신 데이터 확인중...");
    applyStateToView();
  }

  if(!cached || forceRefresh) showLoading();

  try{
    const [a,b]=await Promise.all([
      fetchTextWithRetry(ACSV,3,700),
      fetchTextWithRetry(BCSV,3,700)
    ]);

    const rowsA=parseCSV(a);
    const rowsB=parseCSV(b);

    buildStateFromParsed(rowsA, rowsB);
    saveCache(rowsA, rowsB);
    showCacheHint("최신 데이터 반영 완료");
    applyStateToView();
    $listWrap.scrollTop=0;

  }catch(err){
    if(!cached){
      $container.innerHTML="데이터 불러오기 오류<br><br>새로고침 버튼을 눌러 다시 시도해주세요.";
      showCacheHint("");
    }
    console.error(err);
  }finally{
    hideLoading();
    if(cached && (now-cached.savedAt)>CACHE_TTL_MS){
      showCacheHint("표시된 데이터는 캐시이며, 최신 데이터 확인을 시도했습니다.");
    }
  }
}

function showArea(area){
  currentArea=area;
  currentMode="area";
  updateButtons();
  $suggest.style.display="none";
  renderArea();
  $listWrap.scrollTop=0;
}

function showCalendarMode(mode){
  currentMode = mode;

  if(mode==="month"){
    selectedDate = baseWorkdayYMD();
    updateButtons();
    $suggest.style.display="none";
    renderMonthView(true);
  }

  if(mode==="day"){
    selectedDate = baseWorkdayYMD();
    updateButtons();
    $suggest.style.display="none";
    renderDayView(false);
  }

  $listWrap.scrollTop=0;
}

function goToday(){
  selectedDate = baseWorkdayYMD();

  if(currentMode==="month"){
    renderMonthView(true);
  }

  if(currentMode==="day"){
    renderDayView(false);
  }

  $listWrap.scrollTop=0;
}

function reloadData(){
  $suggest.innerHTML="";
  $suggest.style.display="none";
  loadAllData(true);
}

$search.addEventListener("input",function(){
  const v=this.value.trim();
  if(!v){
    $suggest.innerHTML="";
    $suggest.style.display="none";
    applyStateToView();
    return;
  }
  rebuildSuggestions();
  renderSearch(v);
  $listWrap.scrollTop=0;
});

$search.addEventListener("focus",function(){
  if(this.value.trim()) rebuildSuggestions();
});

$listWrap.addEventListener("scroll",()=>{
  $suggest.style.display="none";
});

updateButtons();
loadAllData(false);
</script>
</body>
</html>
